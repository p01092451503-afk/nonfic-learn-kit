<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>NONFICTION Education</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#1a1a2e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NONFICTION" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="icon" href="data:," />
    <meta name="description" content="논픽션 사내 교육 시스템입니다.">
    <meta name="author" content="NONFICTION" />

    <!-- Preconnect to critical origins to parallelize handshake -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://hugyfvlbdrxcxnaarnsm.supabase.co" />

    <!-- Async (non-render-blocking) Google Fonts.
         204KB CSS was previously blocking First Paint for ~700ms+. -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=Noto+Serif+KR:wght@500;700&family=Playfair+Display:wght@500;700&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=Noto+Serif+KR:wght@500;700&family=Playfair+Display:wght@500;700&display=swap"
      />
    </noscript>

    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.png">
    <meta property="og:title" content="NONFICTION Education">
    <meta property="og:description" content="논픽션 사내 교육 시스템입니다.">

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="NONFICTION Education">
    <meta name="twitter:image" content="/og-image.png">
    <meta name="twitter:description" content="논픽션 사내 교육 시스템입니다.">
</head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.addEventListener('error', function(e) {
        if (e.message && e.message.indexOf('module script') !== -1) {
          if (!sessionStorage.getItem('chunk_reload')) {
            sessionStorage.setItem('chunk_reload', '1');
            window.location.reload();
          }
        }
      });
    </script>
  </body>
</html>
